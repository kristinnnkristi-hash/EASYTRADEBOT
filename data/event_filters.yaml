# ------------------------------
# Trash / ignore filters — discard immediately
# ------------------------------
trash:
  action: discard
  reason: "High-volume noise and marketing messages to ignore"
  patterns:
    - "\\bairdrop\\b"
    - "\\bgiveaway\\b"
    - "\\bwhitelist\\b"
    - "\\bpresale\\b"
    - "\\bmint\\b"
    - "\\bmeme coin\\b"
    - "\\bmemecoin\\b"
    - "\\b100x\\b"
    - "\\bsignals vip\\b"
    - "\\bcrypto signals\\b"
    - "\\btrading course\\b"
    - "\\bsubscribe now\\b"
    - "\\bpromotion\\b"
    - "\\bsponsored post\\b"
    - "\\bподпишись\\b"
    - "\\bраздача токенов\\b"
    - "\\bвайтлист\\b"
    - "\\bпродажа по предзаказу\\b"
    - "\\bобучение трейдингу\\b"
    - "\\bзаработай\\b"
    - "\\bскам\\b"
    - "\\bрозыгрыш\\b"

# ------------------------------
# Composite / global matching configuration
# ------------------------------
composite_rules:
  proximity_window_words: 10                     # сколько слов допускается между тикером и триггером
  require_ticker_proximity_for_actions:
    - geopolitical_critical
    - sanctions_trade_war
    - maritime_chokepoints
    - corporate_negative
    - options_flow_and_blocktrades
  deduplication:
    enabled: true
    cosine_threshold: 0.85
  time_decay:
    enabled: true
    half_life_days: 30
  scoring:
    # final score = weighted sum(source_weight * category_weight * pattern_count * recency_factor)
    formula: "sum(source_weight * category_weight * evidence_count * recency_factor)"
    normalize_to: 1.0
  notify_threshold:
    default: 0.7
    critical_override: 0.5   # lower threshold for critical categories
  min_sources_for_confident_event: 2

# ------------------------------
# Helper synonyms / aliases (удобно для расширения и быстрого поиска)
# ------------------------------
aliases:
  # military synonyms
  military:
    - "army"
    - "troops"
    - "forces"
    - "armed forces"
  # trade synonyms
  trade:
    - "tariff"
    - "duty"
    - "tariffs"
    - "customs duty"
  # finance synonyms
  buyback:
    - "share buyback"
    - "stock buyback"
    - "repurchase program"
  # crypto noise synonyms
  crypto_noise:
    - "airdrop"
    - "giveaway"
    - "presale"
    - "mint"

# ------------------------------
# Channel-specific overrides (пример; actual channel mapping хранится отдельно в channels_list.yaml)
# ------------------------------
channel_overrides:
  # пример: если канал высоко доверенный, можно увеличить source weight
  "t.me/reuters": { source_weight: 1.0 }
  "t.me/bloomberg": { source_weight: 1.0 }
  "t.me/unknown_small": { source_weight: 0.25 }

# ------------------------------
# Notes (do not edit unless you know what you do)
# ------------------------------
notes:
  - "При добавлении новых шаблонов используйте word-boundary (\\bpattern\\b) чтобы избежать ложных срабатываний."
  - "Русские шаблоны должны учитывать базовые склонения (лучше использовать лемматизацию в NLP-пайплайне)."
  - "proximity_window_words рекомендует использовать парсинг на уровне предложений; если тикер и триггер в одном предложении — считать как близкие."
  - "trash patterns выполняются в начале пайплайна (fast reject) чтобы уменьшить нагрузку на NLP/embeddings."
  - "future_signals помечаются tag='future' и получают меньший вес; в случае подтверждения (2+ источника) вес автоматически повышается."