      - "\\bнаращиван(?:ие|ий) военного потенциала\\b"
      - "\\bпереброска войск\\b"
      - "\\bракетный удар\\b"
      - "\\bвоздушный удар\\b"
      - "\\bудар дрона\\b"
      - "\\bвоенные учения\\b"
      - "\\bвоенный корабль\\b"
      - "\\bавианосная группа\\b"
      - "\\bвоенная эскалация\\b"
      - "\\bвоенный конфликт\\b"
      - "\\bпограничные столкновения\\b"
      - "\\bвторжение\\b"
      - "\\bмобилизация\\b"
      - "\\bответный удар\\b"
      - "\\bконтрнаступление\\b"
      - "\\bнаступление\\b"
      - "\\bпакт о коллективной обороне\\b"
