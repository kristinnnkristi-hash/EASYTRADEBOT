# data/event_filters.yaml
# Event filter rules for QuasiHedge Bot
# -------------------------------------
# Структура:
# meta: общая информация
# defaults: глобальные настройки, которые используются при обработке правил
# source_weights: рекомендуемые веса доверия для типов источников (можно переопределить per-channel)
# categories: список правил по категориям; каждое правило содержит:
#   name, description, weight (numeric), notify (bool), action (keep/ discard/ tag),
#   severity (1-10), patterns (список строк/regex), languages, examples
# trash: отдельный блок с низкоприоритетными/игнорируемыми фразами
# composite_rules: общие правила proximity, ticker proximity window и т.д.

meta:
  version: 1.0
  author: quasihedge-bot
  created: 2026-03-05
  description: |
    Полный набор правил/фраз для детектирования событий в новостях / Telegram /
    RSS. Включает англо- и русскоязычные шаблоны, веса и действия.
    Использовать этот файл как источник прав для rule-matcher в nlp_events.py.

defaults:
  event_half_life_days: 30           # время полураспада влияния события
  dedup_cosine_threshold: 0.85       # порог для de-duplication (cosine similarity)
  proximity_window_words: 10         # максимальное расстояние (слов) между тикером и триггером
  min_confidence_to_notify: 0.7      # порог confidence для уведомления (0..1)
  min_analogs_required: 30
  ticker_detection_regex: "\\b[A-Z0-9]{1,6}\\b"   # базовый тикер regex (можно уточнить)
  languages_supported: ["en", "ru"]

# Рекомендуемые веса доверия для источников — использовать для агрегирования confidence
source_weights:
  official_press_release: 1.0
  reuters: 1.0
  bloomberg: 1.0
  sec_edgar: 1.0
  major_media: 0.95
  financial_news_site: 0.9
  trusted_telegram_channel: 0.8
  large_telegram_channel: 0.6
  small_telegram_channel: 0.3
  reddit: 0.2
  twitter_x: 0.4
  unknown: 0.2

# ------------------------------
# Категории правил (priority order: top = highest)
# ------------------------------
categories:

