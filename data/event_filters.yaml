      - "\\btroop deployment\\b"
      - "\\bmissile strike\\b"
      - "\\bairstrike\\b"
      - "\\bdrone strike\\b"
      - "\\bnaval exercise\\b"
      - "\\bwarship\\b"
      - "\\bcarrier strike group\\b"
      - "\\bmilitary escalation\\b"
      - "\\barmed conflict\\b"
      - "\\bborder clashes\\b"
      - "\\binvasion\\b"
      - "\\bmobilization\\b"
      - "\\bretaliation\\b"
      - "\\bcounterattack\\b"
      - "\\boffensive\\b"
      - "\\bdefense pact\\b"
      - "\\bArticle 5\\b"
      - "\\bstate of emergency\\b"
      - "\\bmartial law\\b"
      - "\\bnational emergency\\b"
      - "\\bmilitary alert\\b"
      - "\\bair defense activation\\b"
      # military (RU)
